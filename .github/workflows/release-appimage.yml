name: Release AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-appimage
        run: cargo install cargo-appimage

      - name: Install appimagetool
        run: |
          wget -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          sudo mv appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: cargo appimage

      - name: Collect artifacts
        run: |
          mkdir -p dist
          ls -la target/appimage || true
          if ! ls target/appimage/*.AppImage >/dev/null 2>&1; then
            echo "No AppImage produced. Check earlier cargo appimage logs."
            exit 1
          fi
          cp target/appimage/*.AppImage dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-rs-appimage
          path: dist/*.AppImage

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
